<div>
  <div class="container mx-auto px-3 sm:px-4">
    <h1 class="text-2xl sm:text-3xl md:text-4xl pt-6 sm:pt-8 md:pt-10 pb-4 sm:pb-6 md:pb-8 font-semibold font-signika tracking-wider">PORTFOLIO</h1>
    <section class="text-neutral-700 dark:text-neutral-300">
      <div class="w-full">
        <div class="columns-1 sm:columns-2 lg:columns-3 gap-3 sm:gap-4">
          <div *ngFor="let image of portfolioImages" class="reveal-image relative mb-3 sm:mb-4 break-inside-avoid group">
            <div class="overflow-hidden rounded-lg shadow-md hover:shadow-xl transition-shadow duration-500">
              <a [href]="getFullSizeUrl(image)"
                 data-fancybox="gallery"
                 class="block aspect-auto relative">
                <img [ngSrc]="getDisplayUrl(image)"
                     [width]="getDisplayWidth(image)"
                     [height]="getDisplayHeight(image)"
                     [alt]="image.alt"
                     class="w-full h-auto object-cover transition-transform duration-500 ease-out group-hover:scale-[1.03]">
                <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors duration-500"></div>
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

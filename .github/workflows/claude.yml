name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Print the full agent session (every tool call) in the step log
          show_full_output: true
          claude_args: |
            --model claude-haiku-4-5-20251001
            --allowedTools "Bash(npm ci),Bash(npm run build),Bash(npm run build:*),Bash(npm test),Bash(npx ng build:*)"
            --max-turns 50
            --append-system-prompt "Before pushing any change, run 'npm test' and make sure all tests pass; fix failures first. The workflow opens a pull request from your branch automatically after you push; CI runs the full build and tests on it and merge is blocked until they pass."

      # Enforced test gate: the agent's "run tests first" instruction is
      # advisory; this step actually runs them on the pushed branch. Fails
      # the job (and blocks PR creation) if the suite is red.
      - name: Verify Claude's branch builds and passes tests
        if: steps.claude.outputs.branch_name != ''
        run: |
          git fetch origin "${{ steps.claude.outputs.branch_name }}"
          git checkout "${{ steps.claude.outputs.branch_name }}"
          npm ci
          npm run build
          npm test

      # The action cannot open PRs itself (by design it only pushes a branch
      # and posts a prefilled link). This step closes that gap deterministically.
      # Runs only if the test gate above passed.
      # Note: outputs.github_token is revoked by the action's own cleanup step,
      # so we must use the workflow GITHUB_TOKEN here.
      - name: Open PR for Claude's branch
        if: steps.claude.outputs.branch_name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Idempotent: job re-runs must not fail because the PR already exists.
          if gh pr view "${{ steps.claude.outputs.branch_name }}" --repo "${{ github.repository }}" --json number --jq .number 2>/dev/null; then
            echo "PR already exists for this branch — skipping create."
            exit 0
          fi
          gh pr create \
            --repo "${{ github.repository }}" \
            --head "${{ steps.claude.outputs.branch_name }}" \
            --title "${{ github.event.issue.title || 'Claude changes' }}" \
            --body "Automated change by Claude for #${{ github.event.issue.number }}.

          Closes #${{ github.event.issue.number }}"

      # PRs created with GITHUB_TOKEN don't trigger ci.yml (GitHub recursion
      # guard), which would leave the required build-test check pending forever.
      # The gate step above already ran the identical build+test, so report it
      # as the build-test status on the branch head to satisfy branch protection.
      - name: Report build-test status on branch head
        if: steps.claude.outputs.branch_name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/$(git rev-parse HEAD)" \
            -f state=success \
            -f context=build-test \
            -f description="npm ci + build + test passed in Claude workflow gate"
